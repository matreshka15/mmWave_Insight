site_name: mmWave Insight
site_description: Deep Dive into mmWave Radar Technology | 深入毫米波雷达技术
site_author: mmWave Radar Community
site_url: https://matreshka15.github.io/mmWave_Insight/

# Repository
repo_name: matreshka15/mmWave_Insight
repo_url: https://github.com/matreshka15/mmWave_Insight
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2025 matreshka15 | mmWave Insight

# Configuration
theme:
  name: material
  language: zh
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  font:
    text: Noto Sans SC
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.critic
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds: {case: lower}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      permalink_title: 永久链接
      toc_depth: 4

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Extra JavaScript
extra_javascript:
  - javascripts/mathjax.js
  - javascripts/libs/polyfill.min.js
  - javascripts/libs/tex-mml-chtml.js
  - javascripts/libs/mermaid.min.js
  - javascripts/mermaid-init.js

# Page tree
nav:
  - 🏠 主页: index.md

  - 📚 基础入门:
    - 雷达原理概述: radar-basics/overview.md
    - 雷达方程详解: radar-basics/radar-equation.md
    - 多普勒效应: radar-basics/doppler-effect.md

  - 🔬 进阶理论:
    - FMCW 调制原理: mmwave/fmcw.md
    - 信号处理技术: mmwave/signal-processing.md
    - 目标检测算法: mmwave/target-detection.md
    - MIMO 与 DOA 估计: mmwave/mimo-doa.md
    - 高级主题: mmwave/advanced-topics.md

  - 🎮 互动学习:
    - 交互式游乐场: interactive-playground.md
    - 练习题库: exercises.md

  - 🛠️ 硬件平台:
    - IWR1443 硬件: iwr1443/hardware.md
    - 开发环境搭建: iwr1443/development.md

  - 📖 附加资源:
    - 图片库: image-gallery.md
    - 参考资料: references.md
    - 术语表: glossary.md
    - 贡献指南: contributing.md
    - 更新日志: changelog.md

# Plugins
plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;'
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      fallback_to_build_date: true
      enable_creation_date: true
      enable_git_follow: false
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

# Extra
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/matreshka15/mmWave_Insight
      name: GitHub Repository
  analytics:
    feedback:
      title: 本页对你有帮助吗？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 非常有帮助
          data: 1
          note: 感谢你的反馈！
        - icon: material/emoticon-sad-outline
          name: 还可以改进
          data: 0
          note: >-
            感谢反馈！欢迎通过 <a href="https://github.com/matreshka15/mmWave_Insight/issues/new" target="_blank" rel="noopener">GitHub Issues</a> 告诉我们如何改进。

# Validation (build warnings)
validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: warn

# Exclude non-content files
exclude_docs: |
  images/README.md

